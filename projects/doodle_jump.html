<!DOCTYPE html>
<html>
<head>
    <title>Doodle Jump!</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #c9e4f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Caveat', cursive;
            gap: 10px;
        }
        h1 { color: #222; font-size: 2.6em; letter-spacing: 2px; }
        canvas { border: 4px solid #222; display: block; }
        p { color: #333; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Doodle Jump!</h1>
    <canvas id="game" width="400" height="600"></canvas>
    <p>Arrow keys (or A / D) to move</p>

    <script>
    const canvas = document.getElementById('game');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const GRAVITY  = 0.35;
    const JUMP     = -12;
    const JUMP_BIG = -17;
    const PLR_W = 44, PLR_H = 44;
    const PLAT_W = 68, PLAT_H = 14;

    let state = 'start';
    let score = 0, best = 0, cameraY = 0;
    let player, platforms, flameThrowers, fireballs, nextFlameY, trail;

    // ── Input ─────────────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.code === 'Space') {
            e.preventDefault();
            if (state === 'start' || state === 'over') initGame();
        }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── Init ──────────────────────────────────────────────────────────────────
    function initGame() {
        score = 0; cameraY = 0; state = 'play'; trail = [];
        player        = { x: W/2 - PLR_W/2, y: H - 150, vx: 0, vy: 0 };
        flameThrowers = [];
        fireballs     = [];
        nextFlameY    = H - 600;
        platforms     = [{ x: W/2 - PLAT_W/2, y: H - 100, type: 'normal', dir: 1 }];
        let topY = H - 180;
        for (let i = 0; i < 20; i++) { topY -= 70 + Math.random() * 40; platforms.push(makePlatform(topY)); }
    }

    function makePlatform(y) {
        return { x: Math.random() * (W - PLAT_W), y, type: Math.random() < 0.18 ? 'bounce' : 'normal', dir: Math.random() < 0.5 ? 1 : -1 };
    }

    function maintainPlatforms() {
        let minY = Math.min(...platforms.map(p => p.y));
        while (minY > cameraY - 500) { minY -= 70 + Math.random() * 50; platforms.push(makePlatform(minY)); }
        platforms = platforms.filter(p => p.y < cameraY + H + 200);
    }

    function maintainFlameThrowers() {
        while (nextFlameY > cameraY - 300) {
            nextFlameY -= 250 + Math.random() * 200;
            const side = Math.random() < 0.5 ? 'left' : 'right';
            flameThrowers.push({ x: side === 'left' ? 0 : W - 24, y: nextFlameY, side,
                timer: Math.floor(Math.random() * 100), interval: 80 + Math.floor(Math.random() * 60) });
        }
        flameThrowers = flameThrowers.filter(f => f.y < cameraY + H + 100);
        fireballs     = fireballs.filter(f => f.x > -30 && f.x < W + 30);
    }

    function updateFlameThrowers() {
        for (const ft of flameThrowers) {
            if (--ft.timer <= 0) {
                ft.timer = ft.interval;
                fireballs.push({ x: ft.side === 'left' ? 28 : W - 28, y: ft.y, vx: ft.side === 'left' ? 4.5 : -4.5, age: 0 });
            }
        }
        for (const fb of fireballs) { fb.x += fb.vx; fb.age++; }
        for (const fb of fireballs) {
            const fsy = fb.y - cameraY;
            if (fb.x+10 > player.x+6 && fb.x-10 < player.x+PLR_W-6 &&
                fsy+10 > player.y-cameraY+6 && fsy-10 < player.y-cameraY+PLR_H-6) state = 'over';
        }
    }

    // ── Update ────────────────────────────────────────────────────────────────
    function update() {
        if (state !== 'play') return;

        if      (keys['ArrowLeft']  || keys['a'] || keys['A']) player.vx = -5;
        else if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = 5;
        else player.vx *= 0.8;

        player.vy += GRAVITY;
        player.x  += player.vx;
        player.y  += player.vy;

        if (player.x + PLR_W < 0) player.x = W;
        if (player.x > W)         player.x = -PLR_W;

        if (player.vy > 0) {
            const bottom = player.y + PLR_H;
            for (const p of platforms) {
                if (player.x + PLR_W - 6 > p.x && player.x + 6 < p.x + PLAT_W &&
                    bottom >= p.y && bottom <= p.y + PLAT_H + Math.abs(player.vy) + 2) {
                    player.vy = p.type === 'bounce' ? JUMP_BIG : JUMP;
                    player.y  = p.y - PLR_H;
                }
            }
        }

        for (const p of platforms) {
            if (p.type === 'bounce') { p.x += p.dir * 2; if (p.x <= 0 || p.x + PLAT_W >= W) p.dir *= -1; }
        }

        const targetCam = player.y - H / 3;
        if (targetCam < cameraY) cameraY = targetCam;
        score = Math.max(score, Math.floor(-cameraY / 8));
        if (score > best) best = score;

        // Trail: newest at front
        trail.unshift({ x: player.x + PLR_W/2, y: player.y + PLR_H/2 });
        if (trail.length > 22) trail.pop();

        maintainPlatforms();
        maintainFlameThrowers();
        updateFlameThrowers();

        if (player.y > cameraY + H + 60) state = 'over';
    }

    // ── Doodle helpers ────────────────────────────────────────────────────────
    // j(a) returns a random offset in the range [-a, a]
    function j(a = 3) { return (Math.random() - 0.5) * a * 2; }

    // Wobbly filled+outlined rectangle
    function doodleRect(x, y, w, h, fill) {
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.moveTo(x      + j(0.4), y      + j(0.4));
        ctx.lineTo(x+w    + j(0.4), y      + j(0.4));
        ctx.lineTo(x+w    + j(0.4), y+h    + j(0.4));
        ctx.lineTo(x      + j(0.4), y+h    + j(0.4));
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5; ctx.lineCap = ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(    x + j(1.5),      y + j(1.5));
        ctx.bezierCurveTo(x+w*.35+j(2), y+j(2.5),     x+w*.65+j(2), y+j(2.5),     x+w + j(1.5), y      + j(1.5));
        ctx.bezierCurveTo(x+w+j(2.5),   y+h*.35+j(2), x+w+j(2.5),   y+h*.65+j(2), x+w + j(1.5), y+h    + j(1.5));
        ctx.bezierCurveTo(x+w*.65+j(2), y+h+j(2.5),   x+w*.35+j(2), y+h+j(2.5),   x   + j(1.5), y+h    + j(1.5));
        ctx.bezierCurveTo(x+j(2.5),     y+h*.65+j(2), x+j(2.5),     y+h*.35+j(2), x   + j(1.5), y      + j(1.5));
        ctx.stroke();
    }

    // Wobbly filled+outlined ellipse
    function doodleCircle(cx, cy, rx, ry, fill) {
        const kx = rx * 0.55, ky = ry * 0.55;
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.moveTo(cx+j(.8),      cy-ry+j(.8));
        ctx.bezierCurveTo(cx+kx+j(2), cy-ry+j(1.2), cx+rx+j(1.2), cy-ky+j(2), cx+rx+j(.8), cy+j(.8));
        ctx.bezierCurveTo(cx+rx+j(1.2), cy+ky+j(2), cx+kx+j(2), cy+ry+j(1.2), cx+j(.8),    cy+ry+j(.8));
        ctx.bezierCurveTo(cx-kx+j(2), cy+ry+j(1.2), cx-rx+j(1.2), cy+ky+j(2), cx-rx+j(.8), cy+j(.8));
        ctx.bezierCurveTo(cx-rx+j(1.2), cy-ky+j(2), cx-kx+j(2), cy-ry+j(1.2), cx+j(.8),    cy-ry+j(.8));
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5; ctx.lineCap = ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(cx+j(1.5),      cy-ry+j(1.5));
        ctx.bezierCurveTo(cx+kx+j(3), cy-ry+j(2), cx+rx+j(2), cy-ky+j(3), cx+rx+j(1.5), cy+j(1.5));
        ctx.bezierCurveTo(cx+rx+j(2), cy+ky+j(3), cx+kx+j(3), cy+ry+j(2), cx+j(1.5),    cy+ry+j(1.5));
        ctx.bezierCurveTo(cx-kx+j(3), cy+ry+j(2), cx-rx+j(2), cy+ky+j(3), cx-rx+j(1.5), cy+j(1.5));
        ctx.bezierCurveTo(cx-rx+j(2), cy-ky+j(3), cx-kx+j(3), cy-ry+j(2), cx+j(1.5),    cy-ry+j(1.5));
        ctx.closePath();
        ctx.stroke();
    }

    // Little wobbly star (drawn at origin — wrap in ctx.save/translate/restore)
    function star(r) {
        const inner = r * 0.4;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
            const rad = i % 2 === 0 ? r : inner;
            const px = Math.cos(angle) * rad + j(1.5);
            const py = Math.sin(angle) * rad + j(1.5);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    // ── Drawing ───────────────────────────────────────────────────────────────
    function drawBackground() {
        ctx.fillStyle = '#fffef2';
        ctx.fillRect(0, 0, W, H);

        // Scrolling notebook lines
        const spacing = 28;
        const offset  = ((-cameraY % spacing) + spacing) % spacing;
        ctx.strokeStyle = 'rgba(150, 195, 255, 0.55)';
        ctx.lineWidth = 1;
        for (let y = offset; y < H; y += spacing) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // Red margin
        ctx.strokeStyle = 'rgba(255, 130, 130, 0.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(36, 0); ctx.lineTo(36, H); ctx.stroke();
    }

    function drawCloud(x, y, s) {
        s = s || 1;
        for (const [cx, cy, rx, ry] of [
            [x,       y,       28*s, 20*s],
            [x+22*s,  y+4*s,   23*s, 16*s],
            [x-18*s,  y+4*s,   19*s, 13*s],
            [x+7*s,   y-10*s,  16*s, 12*s],
        ]) doodleCircle(cx, cy, rx, ry, 'white');
    }

    function drawPlatform(p) {
        const sx = p.x, sy = p.y - cameraY;
        if (sy < -20 || sy > H + 10) return;
        doodleRect(sx, sy, PLAT_W, PLAT_H, p.type === 'bounce' ? '#ff7043' : '#66bb6a');
        if (p.type === 'bounce') {
            ctx.fillStyle = 'white'; ctx.font = 'bold 11px Caveat, cursive'; ctx.textAlign = 'center';
            ctx.fillText('BOING!', sx + PLAT_W/2 + j(1), sy + PLAT_H - 1 + j(1));
            ctx.textAlign = 'left';
        }
    }

    function drawPlayer() {
        const sx = player.x, sy = player.y - cameraY;
        const cx = sx + PLR_W/2, cy = sy + PLR_H/2;

        // Body
        doodleCircle(cx, cy, PLR_W/2, PLR_H/2, '#fff9c4');

        // Eyes (whites + pupils + catchlights)
        doodleCircle(cx - 9, cy - 7, 6, 7, 'white');
        doodleCircle(cx + 9, cy - 7, 6, 7, 'white');
        const pdx = player.vx > 1 ? 2 : player.vx < -1 ? -2 : 0;
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(cx - 9 + pdx, cy - 6, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + 9 + pdx, cy - 6, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(cx - 9 + pdx + 1, cy - 8, 1.3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + 9 + pdx + 1, cy - 8, 1.3, 0, Math.PI*2); ctx.fill();

        // Mouth
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        ctx.beginPath();
        if (player.vy < 0) ctx.arc(cx + j(1), cy + 6,  8, 0.1,         Math.PI - 0.1);
        else               ctx.arc(cx + j(1), cy + 10, 7, Math.PI+0.1, -0.1);
        ctx.stroke();

        // Hat brim
        ctx.fillStyle = '#e53935'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(cx + j(1), sy + 5 + j(1), PLR_W/2 - 2, 7, j(0.05), 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Hat body
        doodleRect(cx - 11, sy - 12, 22, 17, '#e53935');
        // Propeller blades
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
        ctx.fillStyle = '#42a5f5';
        ctx.beginPath(); ctx.ellipse(cx - 8 + j(1), sy - 16 + j(1), 9, 4,  0.5 + j(0.1), 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#aed581';
        ctx.beginPath(); ctx.ellipse(cx + 8 + j(1), sy - 16 + j(1), 9, 4, -0.5 + j(0.1), 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(cx + j(1), sy - 16, 3, 0, Math.PI*2); ctx.fill();

        // Stick arms
        ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(sx + 3, cy - 2); ctx.lineTo(sx - 9  + j(2), cy + 7 + j(2)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx + PLR_W - 3, cy - 2); ctx.lineTo(sx + PLR_W + 9 + j(2), cy + 7 + j(2)); ctx.stroke();
    }

    function drawTrail() {
        // Draw oldest first (behind), newest last (closest to player)
        for (let i = trail.length - 1; i >= 0; i--) {
            const t = trail[i];
            const sy   = t.y - cameraY;
            const frac = 1 - i / trail.length; // 0 = oldest/faded, 1 = newest/bright
            const r    = 3 + frac * 9;
            ctx.save();
            ctx.translate(t.x, sy);
            ctx.rotate(j(0.5));
            ctx.fillStyle   = `rgba(255, 210, 40, ${frac * 0.8})`;
            ctx.strokeStyle = `rgba(230, 80, 0, ${frac * 0.5})`;
            ctx.lineWidth = 1.5;
            star(r);
            ctx.restore();
        }
    }

    function drawFlameThrower(ft) {
        const sy = ft.y - cameraY;
        if (sy < -50 || sy > H + 50) return;

        doodleRect(ft.x, sy - 13, 24, 26, '#78909c');
        if (ft.side === 'left') doodleRect(ft.x + 18, sy - 6, 20, 12, '#546e7a');
        else                    doodleRect(ft.x - 20, sy - 6, 20, 12, '#546e7a');

        // Animated flame flicker at barrel tip
        const tipX = ft.side === 'left' ? ft.x + 39 : ft.x - 15;
        for (let i = 0; i < 4; i++) {
            ctx.fillStyle = `rgba(255, ${60 + Math.floor(Math.random()*150)}, 0, ${0.5 + Math.random()*0.5})`;
            ctx.beginPath(); ctx.arc(tipX + j(4), sy + j(4), 5 + Math.random()*4, 0, Math.PI*2); ctx.fill();
        }
    }

    function drawFireball(fb) {
        const sy = fb.y - cameraY;
        if (sy < -30 || sy > H + 30) return;

        // Fading blob trail behind the ball
        for (let t = 5; t >= 1; t--) {
            const tx    = fb.x - fb.vx * t * 3.5;
            const alpha = (6 - t) / 10;
            ctx.fillStyle   = `rgba(255, ${40 + t * 30}, 0, ${alpha})`;
            ctx.strokeStyle = `rgba(160, 0, 0, ${alpha * 0.4})`;
            ctx.lineWidth   = 1.5;
            ctx.beginPath(); ctx.arc(tx + j(2), sy + j(2), 14 - t * 1.8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        }

        // Main ball + hot core
        doodleCircle(fb.x, sy, 12, 12, '#ff6f00');
        doodleCircle(fb.x + j(0.5), sy + j(0.5), 6, 6, '#ffee58');
    }

    function drawHUD() {
        ctx.fillStyle = '#222';
        ctx.font = 'bold 24px Caveat, cursive';
        ctx.fillText('Score: ' + score, 42, 32);
        ctx.fillText('Best: '  + best,  42, 58);
    }

    function drawOverlay(line1, line2, line3) {
        ctx.fillStyle = 'rgba(255, 253, 215, 0.9)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#111';
        ctx.font = 'bold 50px Caveat, cursive'; ctx.fillText(line1, W/2, H/2 - 90);
        ctx.font = '28px Caveat, cursive';      ctx.fillText(line2, W/2, H/2 - 18);
        ctx.fillText(line3, W/2, H/2 + 22);
        ctx.fillStyle = '#e53935';
        ctx.font = 'bold 28px Caveat, cursive'; ctx.fillText('Press SPACE to play!', W/2, H/2 + 82);
        ctx.textAlign = 'left';
    }

    // ── Main loop ─────────────────────────────────────────────────────────────
    function loop() {
        update();

        drawBackground();
        drawCloud(55,  90,  1.0);
        drawCloud(270, 200, 0.8);
        drawCloud(130, 370, 1.1);
        drawCloud(300, 490, 0.65);

        platforms.forEach(drawPlatform);
        flameThrowers.forEach(drawFlameThrower);
        fireballs.forEach(drawFireball);

        if (state === 'play' || state === 'over') {
            drawTrail();
            drawPlayer();
            drawHUD();
        }

        if (state === 'start') drawOverlay('Doodle Jump!',  'Arrow keys to move', 'Orange = SUPER bounce!');
        if (state === 'over')  drawOverlay('Game Over!', 'Score: ' + score, 'Best: ' + best);

        requestAnimationFrame(loop);
    }

    // Boot
    initGame();
    state = 'start';
    loop();
    </script>
</body>
</html>
